<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 动物森友会时钟</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  position: relative;
  user-select: none;
}

/* ===== SKY ===== */
#sky {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 62%;
  transition: background 4s ease;
  overflow: hidden;
}

/* ===== CELESTIAL BODY ===== */
#celestial {
  position: absolute;
  border-radius: 50%;
  transition: top 8s linear, left 8s linear, width 3s, height 3s,
              box-shadow 3s, background 3s;
  z-index: 5;
}

/* Stars */
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  transition: opacity 2s ease;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
  0%  { opacity: 0.2; transform: scale(0.8); }
  100%{ opacity: 1;   transform: scale(1.3); }
}

/* Clouds */
.cloud {
  position: absolute;
  animation: floatCloud linear infinite;
  font-size: 48px;
  z-index: 3;
  transition: opacity 3s;
}
@keyframes floatCloud {
  from { transform: translateX(-150px); }
  to   { transform: translateX(calc(100vw + 150px)); }
}

/* Shooting star */
.shoot {
  position: absolute;
  width: 2px;
  height: 90px;
  background: linear-gradient(to bottom, transparent, #fffde7, transparent);
  transform-origin: top center;
  animation: shootAnim 1.2s linear forwards;
  z-index: 6;
}
@keyframes shootAnim {
  0%  { opacity:1; transform: rotate(-40deg) translateY(0); }
  100%{ opacity:0; transform: rotate(-40deg) translateY(380px); }
}

/* ===== GROUND AREA ===== */
#ground {
  position: absolute;
  bottom: 0; left: 0;
  width: 100%;
  height: 38%;
  overflow: hidden;
  transition: background 4s ease;
}
#grass-strip {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 28px;
  border-radius: 50% 50% 0 0 / 18px 18px 0 0;
  transition: background 4s ease;
}
#soil {
  position: absolute;
  top: 20px; left: 0;
  width: 100%;
  height: 100%;
  transition: background 4s ease;
}

/* Path / dirt road */
#path {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 160px;
  height: 95%;
  background: repeating-linear-gradient(
    to bottom,
    #c9a86c 0px, #c9a86c 28px,
    #b8966a 28px, #b8966a 30px
  );
  border-left: 3px solid #b0894a;
  border-right: 3px solid #b0894a;
  border-radius: 6px 6px 0 0;
  opacity: 0.55;
}

/* Trees */
.tree {
  position: absolute;
  bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.tree-crown {
  font-size: 62px;
  line-height: 1;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.18));
  animation: sway 4s ease-in-out infinite alternate;
}
.tree-trunk {
  width: 14px;
  height: 28px;
  background: linear-gradient(to right, #7a5430, #a0733a, #7a5430);
  border-radius: 4px;
  margin-top: -8px;
}
@keyframes sway {
  from { transform: rotate(-3deg); }
  to   { transform: rotate(3deg); }
}

/* Flowers */
.flower {
  position: absolute;
  font-size: 22px;
  bottom: 22px;
  animation: flowerSway 3s ease-in-out infinite alternate;
  filter: drop-shadow(0 2px 2px rgba(0,0,0,0.15));
  z-index: 2;
}
@keyframes flowerSway {
  from { transform: rotate(-8deg) scale(0.95); }
  to   { transform: rotate(8deg) scale(1.05); }
}

/* Fireflies */
.firefly {
  position: absolute;
  width: 5px;
  height: 5px;
  background: #f0ff80;
  border-radius: 50%;
  box-shadow: 0 0 6px 3px rgba(200,255,100,0.8);
  animation: fireflyDrift ease-in-out infinite;
  z-index: 8;
}
@keyframes fireflyDrift {
  0%  { opacity:0;   transform:translate(0,0); }
  20% { opacity:1;   transform:translate(15px,-20px); }
  50% { opacity:0.6; transform:translate(-10px,-38px); }
  80% { opacity:1;   transform:translate(22px,-18px); }
  100%{ opacity:0;   transform:translate(0,0); }
}

/* Butterflies */
.butterfly {
  position: absolute;
  font-size: 18px;
  animation: butterflyFly ease-in-out infinite;
  z-index: 7;
}
@keyframes butterflyFly {
  0%  { transform:translate(0,0) rotate(0deg); }
  25% { transform:translate(40px,-25px) rotate(8deg); }
  50% { transform:translate(80px,8px) rotate(-5deg); }
  75% { transform:translate(40px,-18px) rotate(5deg); }
  100%{ transform:translate(0,0) rotate(0deg); }
}

/* Snow particles */
.snowflake {
  position: absolute;
  font-size: 14px;
  animation: snowFall linear infinite;
  opacity: 0.8;
  z-index: 9;
}
@keyframes snowFall {
  0%  { transform: translateY(-20px) translateX(0) rotate(0deg); opacity:0; }
  10% { opacity:0.9; }
  90% { opacity:0.7; }
  100%{ transform: translateY(110vh) translateX(30px) rotate(360deg); opacity:0; }
}

/* Cherry blossom petals */
.petal {
  position: absolute;
  font-size: 12px;
  animation: petalFall linear infinite;
  z-index: 9;
  opacity: 0.8;
}
@keyframes petalFall {
  0%  { transform: translateY(-10px) translateX(0) rotate(0deg); opacity:0; }
  15% { opacity:1; }
  100%{ transform: translateY(110vh) translateX(60px) rotate(720deg); opacity:0; }
}

/* ===== CLOCK PANEL ===== */
#panel {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
  background: rgba(255, 251, 230, 0.93);
  border-radius: 28px;
  padding: 24px 44px 20px;
  text-align: center;
  border: 4px solid #d4aa55;
  box-shadow:
    0 10px 40px rgba(0,0,0,0.22),
    inset 0 0 0 2px rgba(255,255,255,0.6),
    0 0 0 7px rgba(212,170,85,0.18);
  min-width: 340px;
  z-index: 100;
  backdrop-filter: blur(4px);
}

#panel::before, #panel::after {
  content: '🍃';
  position: absolute;
  font-size: 20px;
}
#panel::before { top: -4px; left: 12px; transform: rotate(-30deg); }
#panel::after  { top: -4px; right: 12px; transform: rotate(30deg) scaleX(-1); }

#island-name {
  font-size: 11px;
  color: #9a7820;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 4px;
  opacity: 0.8;
}

#greeting {
  font-size: 19px;
  font-weight: 800;
  margin-bottom: 8px;
  transition: color 3s ease;
}

#time-main {
  font-size: 78px;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -3px;
  color: #2e4e10;
  text-shadow: 2px 3px 0 rgba(255,255,255,0.7);
  transition: color 3s ease;
}

#time-seconds {
  font-size: 32px;
  font-weight: 800;
  color: #6a8c2e;
  vertical-align: super;
  margin-left: 4px;
}

#ampm {
  font-size: 14px;
  font-weight: 800;
  color: #9a8040;
  letter-spacing: 1px;
  margin-top: 2px;
}

#date-line {
  font-size: 17px;
  font-weight: 700;
  color: #5a7a25;
  margin-top: 8px;
}

#weather-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 10px;
  font-size: 13px;
  color: #7a6020;
  font-weight: 700;
}

.weather-icon { font-size: 26px; }

.divider {
  width: 80%;
  height: 2px;
  background: linear-gradient(to right, transparent, #d4aa55, transparent);
  margin: 12px auto 10px;
  border-radius: 2px;
}

#badge-row {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.badge {
  background: linear-gradient(135deg, #6cc06c, #4aa04a);
  color: white;
  border-radius: 12px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.5px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

#char-row {
  margin-top: 10px;
  font-size: 34px;
  line-height: 1;
  animation: charBounce 2.4s ease-in-out infinite;
}
@keyframes charBounce {
  0%,100%{ transform:translateY(0) scale(1); }
  50%    { transform:translateY(-6px) scale(1.08); }
}

/* Season badge */
#season-badge {
  position: fixed;
  top: 18px;
  right: 20px;
  background: rgba(255, 251, 230, 0.92);
  border: 3px solid #d4aa55;
  border-radius: 18px;
  padding: 6px 14px;
  font-size: 14px;
  font-weight: 800;
  color: #8a6a18;
  z-index: 200;
  box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}

/* Time of day badge */
#tod-badge {
  position: fixed;
  top: 18px;
  left: 20px;
  background: rgba(255, 251, 230, 0.92);
  border: 3px solid #d4aa55;
  border-radius: 18px;
  padding: 6px 14px;
  font-size: 14px;
  font-weight: 800;
  color: #5a3a10;
  z-index: 200;
  box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}

/* Seconds progress bar */
#progress-wrap {
  width: 80%;
  height: 6px;
  background: rgba(0,0,0,0.08);
  border-radius: 3px;
  margin: 10px auto 0;
  overflow: hidden;
}
#progress-bar {
  height: 100%;
  background: linear-gradient(to right, #6cc06c, #a8e060);
  border-radius: 3px;
  transition: width 1s linear;
}

/* ===== GACHA WHEEL ===== */
#gacha-wrap{position:absolute;bottom:3%;left:50%;transform:translateX(-50%);z-index:110;text-align:center;}
#wheel-outer{position:relative;width:200px;height:200px;margin:0 auto;cursor:pointer;filter:drop-shadow(0 8px 22px rgba(0,0,0,0.42));}
#wheel-pointer{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-top:22px solid #d4aa55;z-index:5;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.45));}
#wheel-canvas{width:200px;height:200px;border-radius:50%;display:block;}
#spin-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#fffde7,#f9c800);border:3px solid #c8941a;box-shadow:0 3px 14px rgba(0,0,0,0.35),inset 0 1px 5px rgba(255,255,255,0.7);font-size:22px;cursor:pointer;z-index:10;transition:transform .12s,box-shadow .12s;outline:none;font-family:'Nunito',sans-serif;}
#spin-btn:not(:disabled):hover{transform:translate(-50%,-50%) scale(1.1);box-shadow:0 6px 22px rgba(0,0,0,0.42),inset 0 1px 5px rgba(255,255,255,0.7);}
#spin-btn:not(:disabled):active{transform:translate(-50%,-50%) scale(0.92);}
#spin-btn:disabled{opacity:.75;cursor:not-allowed;}
#gacha-label{margin-top:7px;font-size:12px;font-weight:800;color:rgba(255,255,220,0.93);text-shadow:0 1px 5px rgba(0,0,0,0.6);letter-spacing:.5px;}

/* Reveal modal */
#reveal-modal{display:none;position:fixed;inset:0;z-index:500;align-items:center;justify-content:center;}
#reveal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.52);}
#reveal-card{position:relative;background:rgba(255,251,230,.97);border-radius:28px;padding:26px 40px 22px;text-align:center;min-width:260px;max-width:340px;z-index:1;animation:revealPop .44s cubic-bezier(.34,1.56,.64,1) forwards;}
.reveal-normal #reveal-card{border:4px solid #d4aa55;box-shadow:0 16px 44px rgba(0,0,0,.3);}
.reveal-rare   #reveal-card{border:4px solid #ffd700;box-shadow:0 0 52px rgba(255,215,0,.6),0 16px 48px rgba(0,0,0,.4);background:linear-gradient(135deg,rgba(255,251,220,.97),rgba(255,245,175,.97));}
@keyframes revealPop{0%{transform:scale(.3) translateY(50px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
#rv-emoji{font-size:72px;line-height:1;display:block;margin-bottom:8px;animation:emojiSpin .56s ease-out forwards;}
@keyframes emojiSpin{0%{transform:scale(0) rotate(-180deg)}65%{transform:scale(1.15) rotate(12deg)}100%{transform:scale(1) rotate(0)}}
#rv-name{font-size:22px;font-weight:900;color:#3a3a1a;margin-bottom:4px;}
#rv-meta{font-size:12px;color:#7a6030;font-weight:700;margin-bottom:8px;letter-spacing:.5px;}
.rv-tag{display:inline-block;border-radius:14px;padding:4px 16px;font-size:13px;font-weight:800;margin-bottom:12px;}
.rv-tag.normal{background:#d4f0d4;color:#2a6a2a;border:2px solid #8acc8a;}
.rv-tag.rare{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#fff;border:none;box-shadow:0 2px 14px rgba(255,200,0,.55);font-size:15px;animation:rarePulse 1s ease-in-out infinite alternate;}
@keyframes rarePulse{from{box-shadow:0 2px 14px rgba(255,200,0,.55)}to{box-shadow:0 4px 28px rgba(255,140,0,.85)}}
#rv-desc{font-size:13px;color:#5a4a20;font-weight:600;line-height:1.6;margin-bottom:16px;padding:10px 14px;background:rgba(212,170,85,0.1);border-radius:12px;border-left:3px solid #d4aa55;text-align:left;}
#rv-close{display:block;margin:0 auto;background:linear-gradient(135deg,#6cc06c,#4aa04a);color:#fff;border:none;border-radius:20px;padding:8px 28px;font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.2);transition:transform .1s;}
#rv-close:hover{transform:scale(1.06);}

/* Ultra rare full screen */
#ultra-screen{display:none;position:fixed;inset:0;z-index:600;align-items:center;justify-content:center;flex-direction:column;overflow:hidden;}
#ultra-bg{position:absolute;inset:0;animation:ultraBgAnim 3s ease-in-out infinite alternate;}
@keyframes ultraBgAnim{0%{background:linear-gradient(135deg,#0d0030,#1a0050,#000820)}50%{background:linear-gradient(135deg,#001a40,#400020,#002010)}100%{background:linear-gradient(135deg,#200040,#003020,#400010)}}
#ultra-content{position:relative;z-index:2;text-align:center;padding:20px;max-width:360px;}
#ultra-title{font-size:36px;font-weight:900;background:linear-gradient(90deg,#ff0,#f80,#f0f,#0ff,#0f0,#ff0);background-size:400% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:rainbowShift 1.2s linear infinite;margin-bottom:14px;letter-spacing:3px;}
@keyframes rainbowShift{from{background-position:0%}to{background-position:400%}}
#ultra-emoji{font-size:110px;line-height:1;display:block;margin-bottom:14px;animation:ultraFloat 2s ease-in-out infinite alternate,ultraGlow 1s ease-in-out infinite alternate;}
@keyframes ultraFloat{from{transform:translateY(0) scale(1)}to{transform:translateY(-20px) scale(1.08)}}
@keyframes ultraGlow{from{filter:drop-shadow(0 0 20px #ff0) drop-shadow(0 0 40px #f80)}to{filter:drop-shadow(0 0 32px #f0f) drop-shadow(0 0 64px #0ff)}}
#ultra-name{font-size:28px;font-weight:900;color:#fff;text-shadow:0 0 22px #ffd700,0 0 44px #ff8c00;margin-bottom:6px;}
#ultra-desc{font-size:13px;color:rgba(255,255,200,.85);font-weight:600;line-height:1.6;margin-bottom:8px;padding:0 10px;}
#ultra-subtitle{font-size:13px;color:rgba(255,255,190,.7);font-weight:700;margin-bottom:22px;animation:ultraSubPulse 1.5s ease-in-out infinite alternate;}
@keyframes ultraSubPulse{from{opacity:.65}to{opacity:1}}
#ultra-close{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0000;border:none;border-radius:24px;padding:11px 40px;font-size:17px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;box-shadow:0 4px 22px rgba(255,180,0,.55);transition:transform .15s,box-shadow .15s;letter-spacing:1px;}
#ultra-close:hover{transform:scale(1.08);box-shadow:0 6px 34px rgba(255,180,0,.75);}
.ultra-star{position:absolute;animation:ultraStarFly linear infinite;pointer-events:none;}
@keyframes ultraStarFly{0%{opacity:0;transform:scale(0) rotate(0deg)}25%{opacity:1}75%{opacity:.8}100%{opacity:0;transform:scale(0) rotate(720deg) translateY(-120px)}}
@keyframes particleFly{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.1)}}
@keyframes screenShake{0%,100%{transform:translate(0,0)}20%{transform:translate(-6px,4px)}40%{transform:translate(6px,-4px)}60%{transform:translate(-4px,6px)}80%{transform:translate(4px,-5px)}}
body.screen-shake{animation:screenShake .5s ease-out;}

/* ===== COLLECTION BUTTON ===== */
#coll-btn {
  position: fixed;
  bottom: 22px;
  right: 22px;
  background: rgba(255,251,230,0.95);
  border: 3px solid #d4aa55;
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 800;
  color: #7a5a18;
  z-index: 200;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  transition: transform .12s, box-shadow .12s;
  font-family: 'Nunito', sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
}
#coll-btn:hover { transform: scale(1.06); box-shadow: 0 6px 22px rgba(0,0,0,0.28); }
#coll-count {
  background: linear-gradient(135deg,#6cc06c,#4aa04a);
  color: #fff;
  border-radius: 10px;
  padding: 1px 8px;
  font-size: 12px;
}

/* ===== COLLECTION PANEL ===== */
#coll-panel {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 700;
  background: rgba(10,20,10,0.82);
  backdrop-filter: blur(6px);
  align-items: flex-start;
  justify-content: center;
  overflow-y: auto;
  padding: 20px 12px 40px;
}
#coll-panel.open { display: flex; }
#coll-inner {
  background: rgba(255,251,230,0.97);
  border-radius: 28px;
  border: 4px solid #d4aa55;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  padding: 26px 24px 30px;
  width: 100%;
  max-width: 520px;
  margin: auto;
}
#coll-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
#coll-title {
  font-size: 20px;
  font-weight: 900;
  color: #5a3a10;
}
#coll-progress-text {
  font-size: 13px;
  font-weight: 800;
  color: #9a7820;
}
#coll-close-btn {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  line-height: 1;
  color: #9a7820;
  font-family: 'Nunito', sans-serif;
}
#coll-progress-bar-wrap {
  width: 100%;
  height: 8px;
  background: rgba(0,0,0,0.08);
  border-radius: 4px;
  margin-bottom: 20px;
  overflow: hidden;
}
#coll-progress-bar {
  height: 100%;
  background: linear-gradient(to right, #6cc06c, #d4aa55);
  border-radius: 4px;
  transition: width 0.5s ease;
}
.coll-section-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 2px;
  color: #9a7820;
  text-transform: uppercase;
  margin: 14px 0 8px;
}
.coll-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
  gap: 8px;
  margin-bottom: 6px;
}
.coll-card {
  border-radius: 16px;
  padding: 10px 4px 8px;
  text-align: center;
  cursor: pointer;
  transition: transform .14s, box-shadow .14s;
  position: relative;
}
.coll-card.collected {
  background: rgba(255,255,255,0.85);
  border: 2px solid #d4aa55;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.coll-card.collected:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
.coll-card.locked {
  background: rgba(0,0,0,0.07);
  border: 2px solid rgba(0,0,0,0.1);
  cursor: default;
}
.coll-card-emoji { font-size: 32px; line-height: 1; display: block; margin-bottom: 4px; }
.coll-card.locked .coll-card-emoji { filter: grayscale(1) opacity(0.3); }
.coll-card-name { font-size: 10px; font-weight: 800; color: #5a3a10; line-height: 1.2; }
.coll-card.locked .coll-card-name { color: rgba(0,0,0,0.25); }
.coll-card-name.unknown { letter-spacing: 2px; color: rgba(0,0,0,0.2); }
.coll-card .rarity-dot {
  position: absolute;
  top: 5px; right: 6px;
  width: 7px; height: 7px;
  border-radius: 50%;
}
.coll-card.collected .rarity-dot.rare { background: #ff69b4; box-shadow: 0 0 4px #ff69b4; }
.coll-card.collected .rarity-dot.ultra { background: #ffd700; box-shadow: 0 0 6px #ffd700; }

/* Detail popup inside collection */
#coll-detail {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 800;
  align-items: center;
  justify-content: center;
}
#coll-detail.open { display: flex; }
#coll-detail-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
#coll-detail-card {
  position: relative;
  background: rgba(255,251,230,0.98);
  border-radius: 26px;
  padding: 28px 36px 24px;
  text-align: center;
  max-width: 300px;
  width: 90%;
  z-index: 1;
  animation: revealPop .3s cubic-bezier(.34,1.56,.64,1) forwards;
  border: 4px solid #d4aa55;
  box-shadow: 0 16px 48px rgba(0,0,0,0.35);
}
#cd-emoji { font-size: 64px; line-height: 1; display: block; margin-bottom: 10px; }
#cd-name { font-size: 20px; font-weight: 900; color: #3a3a1a; margin-bottom: 4px; }
#cd-meta { font-size: 12px; color: #7a6030; font-weight: 700; margin-bottom: 8px; }
#cd-tag { display: inline-block; border-radius: 14px; padding: 3px 14px; font-size: 12px; font-weight: 800; margin-bottom: 12px; }
#cd-tag.normal { background: #d4f0d4; color: #2a6a2a; border: 2px solid #8acc8a; }
#cd-tag.rare { background: linear-gradient(135deg,#ffd700,#ff8c00); color: #fff; border: none; }
#cd-tag.ultra { background: linear-gradient(90deg,#f0f,#ff0,#0ff); color: #fff; border: none; font-size: 13px; }
#cd-desc { font-size: 13px; color: #5a4a20; font-weight: 600; line-height: 1.65; margin-bottom: 16px; text-align: left; padding: 10px 12px; background: rgba(212,170,85,0.1); border-radius: 10px; border-left: 3px solid #d4aa55; }
#cd-close { background: linear-gradient(135deg,#6cc06c,#4aa04a); color: #fff; border: none; border-radius: 18px; padding: 7px 24px; font-size: 14px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer; }
#cd-close:hover { transform: scale(1.05); }

/* ===== MUSIC BUTTON ===== */
#music-btn {
  position: fixed;
  bottom: 22px;
  left: 22px;
  background: rgba(255,251,230,0.95);
  border: 3px solid #d4aa55;
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 800;
  color: #7a5a18;
  z-index: 200;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  transition: transform .12s, box-shadow .12s, opacity .3s;
  font-family: 'Nunito', sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
}
#music-btn:hover { transform: scale(1.06); box-shadow: 0 6px 22px rgba(0,0,0,0.28); }
#music-btn.muted { opacity: 0.65; }
#music-note {
  font-size: 16px;
  animation: musicPulse 1.8s ease-in-out infinite;
}
#music-btn.muted #music-note { animation: none; }
@keyframes musicPulse {
  0%,100% { transform: scale(1) rotate(0deg); }
  30%     { transform: scale(1.18) rotate(-8deg); }
  60%     { transform: scale(1.1) rotate(6deg); }
}
</style>

<body>

<div id="sky"></div>
<div id="ground">
  <div id="grass-strip"></div>
  <div id="soil"></div>
  <div id="path"></div>
</div>

<div id="season-badge">🌸 春季</div>

<div id="panel">
  <div id="island-name">🏝️ Nook Islands · 汤姆岛</div>
  <div id="greeting">おはようございます！</div>
  <div id="time-main">12:00<span id="time-seconds">:00</span></div>
  <div id="ampm">午前 · AM</div>
  <div id="date-line">4月21日（火）</div>
  <div class="divider"></div>
  <div id="weather-bar">

</div>

<script>
// ──────────────────────────────────────────
//  DATA
// ──────────────────────────────────────────
const SKY_TIMELINE = [
  { t:0,  top:'#04041a', bot:'#0d0d3a' },
  { t:4,  top:'#1a0d2e', bot:'#2d1a4e' },
  { t:5,  top:'#7b2d8b', bot:'#c2436e' },
  { t:6,  top:'#e8613a', bot:'#f5a550' },
  { t:7,  top:'#5aade0', bot:'#90d4f5' },
  { t:11, top:'#2196f3', bot:'#82d4fa' },
  { t:14, top:'#1976d2', bot:'#64b5f6' },
  { t:17, top:'#e8784a', bot:'#f5b84a' },
  { t:18, top:'#c2316e', bot:'#e8784a' },
  { t:19, top:'#6a1b9a', bot:'#9c27b0' },
  { t:20, top:'#1a237e', bot:'#283593' },
  { t:22, top:'#0d0d2e', bot:'#0a0a22' },
  { t:24, top:'#04041a', bot:'#0d0d3a' },
];

const GROUND_TIMELINE = [
  { t:0,  grass:'#1e3a1e', soil:'#3a2e1a' },
  { t:5,  grass:'#3a5a2a', soil:'#5a4028' },
  { t:7,  grass:'#5db85d', soil:'#c4a46b' },
  { t:17, grass:'#7a7040', soil:'#a08050' },
  { t:19, grass:'#3a5a2a', soil:'#5a4028' },
  { t:22, grass:'#1e3a1e', soil:'#3a2e1a' },
  { t:24, grass:'#1e3a1e', soil:'#3a2e1a' },
];

const GREETINGS = [
  { h:0,  text:'おやすみなさい～', color:'#7a5aaa' },
  { h:5,  text:'おはようございます！', color:'#e85a2a' },
  { h:8,  text:'おはようございます！', color:'#2e8a2e' },
  { h:12, text:'こんにちは！', color:'#1a6aaa' },
  { h:18, text:'こんばんは！', color:'#8a3a8a' },
  { h:22, text:'おやすみなさい～', color:'#5a3a7a' },
];

const TOD_INFO = [
  { h:0,  label:'🌙 深夜',  char:'😴' },
  { h:5,  label:'🌅 黎明',  char:'☕' },
  { h:7,  label:'🌞 早晨',  char:'🦝' },
  { h:10, label:'☀️ 上午',  char:'🌻' },
  { h:12, label:'🌤️ 正午',  char:'🐾' },
  { h:15, label:'🌞 下午',  char:'🎣' },
  { h:17, label:'🌇 傍晚',  char:'🦆' },
  { h:19, label:'🌆 黄昏',  char:'🦉' },
  { h:21, label:'🌙 夜晚',  char:'⭐' },
  { h:23, label:'🌙 深夜',  char:'😴' },
];

const SEASONS = {
  spring: { name:'春季', emoji:'🌸', flowers:['🌸','🌷','🌼','🌺','🌸'], petals: true },
  summer: { name:'夏季', emoji:'🌻', flowers:['🌻','🌺','🌼','🍀','🌿'], petals: false },
  autumn: { name:'秋季', emoji:'🍂', flowers:['🍂','🍁','🌾','🍄','🍁'], petals: false },
  winter: { name:'冬季', emoji:'❄️', flowers:['❄️','🌨️','⛄','🎄','❄️'], snow: true },
};

const WEATHERS = [
  { icon:'☀️',  text:'阳光明媚' },
  { icon:'🌤️', text:'晴间多云' },
  { icon:'⛅',  text:'多云转晴' },
  { icon:'🌦️', text:'零星小雨' },
  { icon:'🌈',  text:'雨后彩虹' },
];

const TREE_EMOJIS = { spring:'🌸', summer:'🌳', autumn:'🍂', winter:'🌲' };

// ──────────────────────────────────────────
//  HELPERS
// ──────────────────────────────────────────
function hexToRgb(h) {
  const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
  return r?{r:parseInt(r[1],16),g:parseInt(r[2],16),b:parseInt(r[3],16)}:{r:0,g:0,b:0};
}
function lerpColor(c1,c2,t){
  const a=hexToRgb(c1),b=hexToRgb(c2);
  const r=Math.round(a.r+(b.r-a.r)*t);
  const g=Math.round(a.g+(b.g-a.g)*t);
  const bl=Math.round(a.b+(b.b-a.b)*t);
  return `rgb(${r},${g},${bl})`;
}
function interpTimeline(tl, totalH) {
  let prev=tl[0], next=tl[tl.length-1];
  for(let i=0;i<tl.length-1;i++){
    if(totalH>=tl[i].t && totalH<tl[i+1].t){ prev=tl[i]; next=tl[i+1]; break; }
  }
  const span = next.t - prev.t || 1;
  return (totalH - prev.t) / span;
}
function getStep(tl, totalH) {
  let res = tl[0];
  for(const s of tl) { if(totalH >= s.h || totalH >= s.t) res = s; }
  return res;
}
function getSeasonName(month) {
  if(month>=3&&month<=5) return 'spring';
  if(month>=6&&month<=8) return 'summer';
  if(month>=9&&month<=11) return 'autumn';
  return 'winter';
}

// ──────────────────────────────────────────
//  INITIALISE STATIC ELEMENTS
// ──────────────────────────────────────────
let currentSeason = '';

function initStars() {
  const sky = document.getElementById('sky');
  for(let i=0;i<120;i++){
    const s = document.createElement('div');
    s.className='star';
    const sz=Math.random()*2.5+0.8;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1+Math.random()*2}s;opacity:0;`;
    s.dataset.star='1';
    sky.appendChild(s);
  }
}

function initClouds() {
  const sky = document.getElementById('sky');
  const emojis = ['☁️','🌤️','⛅'];
  for(let i=0;i<6;i++){
    const c=document.createElement('div');
    c.className='cloud';
    c.dataset.cloud='1';
    const dur=35+Math.random()*40;
    c.style.cssText=`top:${5+Math.random()*55}%;font-size:${36+Math.random()*28}px;animation-duration:${dur}s;animation-delay:${-Math.random()*dur}s;`;
    c.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    sky.appendChild(c);
  }
}

function initCelestial() {
  const sky=document.getElementById('sky');
  let el=document.getElementById('celestial');
  if(!el){ el=document.createElement('div'); el.id='celestial'; sky.appendChild(el); }
}

function initTrees(seasonKey) {
  document.querySelectorAll('.tree').forEach(t=>t.remove());
  const g=document.getElementById('ground');
  const emoji = TREE_EMOJIS[seasonKey];
  [5,12,82,91].forEach((x,i)=>{
    const tree=document.createElement('div');
    tree.className='tree';
    tree.style.cssText=`left:${x}%;animation-delay:${i*0.6}s;`;
    tree.innerHTML=`<div class="tree-crown">${emoji}</div><div class="tree-trunk"></div>`;
    g.appendChild(tree);
  });
}

function initFlowers(seasonKey) {
  document.querySelectorAll('.flower').forEach(f=>f.remove());
  const g=document.getElementById('ground');
  const fl=SEASONS[seasonKey].flowers;
  [22,32,44,56,68,76].forEach((x,i)=>{
    const f=document.createElement('div');
    f.className='flower';
    f.style.cssText=`left:${x}%;animation-delay:${i*0.4}s;`;
    f.textContent=fl[i%fl.length];
    g.appendChild(f);
  });
}

function initFireflies() {
  document.querySelectorAll('.firefly').forEach(f=>f.remove());
  const g=document.getElementById('ground');
  for(let i=0;i<10;i++){
    const f=document.createElement('div');
    f.className='firefly';
    f.style.cssText=`left:${15+Math.random()*70}%;top:${5+Math.random()*60}%;animation-delay:${Math.random()*4}s;animation-duration:${3+Math.random()*3}s;display:none;`;
    g.appendChild(f);
  }
}

function initButterflies() {
  document.querySelectorAll('.butterfly').forEach(b=>b.remove());
  const sky=document.getElementById('sky');
  ['🦋','🐝','🦋'].forEach((em,i)=>{
    const b=document.createElement('div');
    b.className='butterfly';
    b.style.cssText=`left:${15+i*20}%;top:${45+Math.random()*30}%;animation-delay:${i*2.5}s;animation-duration:${7+i*2}s;display:none;`;
    b.textContent=em;
    sky.appendChild(b);
  });
}

let snowInterval=null, petalInterval=null;
function startSnow(on) {
  document.querySelectorAll('.snowflake').forEach(s=>s.remove());
  clearInterval(snowInterval);
  if(!on) return;
  const sky=document.getElementById('sky');
  snowInterval=setInterval(()=>{
    const s=document.createElement('div');
    s.className='snowflake'; s.textContent='❄️';
    s.style.cssText=`left:${Math.random()*100}%;top:-20px;animation-duration:${5+Math.random()*5}s;font-size:${10+Math.random()*8}px;`;
    sky.appendChild(s);
    setTimeout(()=>s.remove(),12000);
  },600);
}
function startPetals(on) {
  document.querySelectorAll('.petal').forEach(p=>p.remove());
  clearInterval(petalInterval);
  if(!on) return;
  const sky=document.getElementById('sky');
  petalInterval=setInterval(()=>{
    const p=document.createElement('div');
    p.className='petal'; p.textContent='🌸';
    p.style.cssText=`left:${Math.random()*100}%;top:-10px;animation-duration:${6+Math.random()*6}s;font-size:${8+Math.random()*6}px;`;
    sky.appendChild(p);
    setTimeout(()=>p.remove(),14000);
  },900);
}

function maybeShootingStar(hours) {
  if((hours>=20||hours<6)&&Math.random()<0.004){
    const sky=document.getElementById('sky');
    const s=document.createElement('div');
    s.className='shoot';
    s.style.cssText=`left:${5+Math.random()*75}%;top:${Math.random()*35}%;`;
    sky.appendChild(s);
    setTimeout(()=>s.remove(),1500);
  }
}

// ──────────────────────────────────────────
//  SEASON INIT / RELOAD
// ──────────────────────────────────────────
function loadSeason(sk) {
  if(currentSeason===sk) return;
  currentSeason=sk;
  const sd=SEASONS[sk];
  document.getElementById('season-badge').textContent=`${sd.emoji} ${sd.name}`;
  initTrees(sk);
  initFlowers(sk);
  startSnow(sd.snow||false);
  startPetals(sd.petals||false);
}

// ──────────────────────────────────────────
//  MAIN UPDATE
// ──────────────────────────────────────────
let weatherObj = WEATHERS[1];
function pickWeather() { weatherObj=WEATHERS[Math.floor(Math.random()*WEATHERS.length)]; }
pickWeather();

function updateScene() {
  const now=new Date();
  const H=now.getHours(), M=now.getMinutes(), S=now.getSeconds();
  const totalH = H + M/60 + S/3600;
  const month = now.getMonth()+1;
  const sk = getSeasonName(month);
  loadSeason(sk);

  // ── Time display ──
  const hStr=String(H).padStart(2,'0');
  const mStr=String(M).padStart(2,'0');
  const sStr=String(S).padStart(2,'0');
  document.getElementById('time-main').innerHTML=`${hStr}:${mStr}<span id="time-seconds">:${sStr}</span>`;
  document.getElementById('ampm').textContent=(H<12?'午前 · AM':'午後 · PM');

  // ── Date ──
  const DAYS=['日','月','火','水','木','金','土'];
  document.getElementById('date-line').textContent=`${month}月${now.getDate()}日（${DAYS[now.getDay()]}）`;

  // ── Progress bar (seconds) ──
  document.getElementById('progress-bar').style.width=(S/60*100)+'%';

  // ── Greeting ──
  let greet=GREETINGS[0];
  for(const g of GREETINGS) if(H>=g.h) greet=g;
  document.getElementById('greeting').textContent=greet.text;
  document.getElementById('greeting').style.color=greet.color;

  // ── TOD badge + character ──
  let tod=TOD_INFO[0];
  for(const d of TOD_INFO) if(H>=d.h) tod=d;
  document.getElementById('tod-badge').textContent=tod.label;
  document.getElementById('char-row').textContent=tod.char;

  // ── Sky ──
  let sp=SKY_TIMELINE[0], sn=SKY_TIMELINE[SKY_TIMELINE.length-1];
  for(let i=0;i<SKY_TIMELINE.length-1;i++){
    if(totalH>=SKY_TIMELINE[i].t&&totalH<SKY_TIMELINE[i+1].t){sp=SKY_TIMELINE[i];sn=SKY_TIMELINE[i+1];break;}
  }
  const t2=(totalH-sp.t)/((sn.t-sp.t)||1);
  const skyTop=lerpColor(sp.top,sn.top,t2);
  const skyBot=lerpColor(sp.bot,sn.bot,t2);
  document.getElementById('sky').style.background=`linear-gradient(to bottom,${skyTop},${skyBot})`;

  // ── Ground ──
  let gp=GROUND_TIMELINE[0],gn=GROUND_TIMELINE[GROUND_TIMELINE.length-1];
  for(let i=0;i<GROUND_TIMELINE.length-1;i++){
    if(totalH>=GROUND_TIMELINE[i].t&&totalH<GROUND_TIMELINE[i+1].t){gp=GROUND_TIMELINE[i];gn=GROUND_TIMELINE[i+1];break;}
  }
  const gt=(totalH-gp.t)/((gn.t-gp.t)||1);
  document.getElementById('grass-strip').style.background=lerpColor(gp.grass,gn.grass,gt);
  document.getElementById('soil').style.background=lerpColor(gp.soil,gn.soil,gt);

  // ── Stars ──
  const isNight=H>=20||H<6;
  const isDusk=(H>=18&&H<20)||(H>=5&&H<7);
  let starAlpha=0;
  if(isNight) starAlpha=1;
  else if(isDusk){
    if(H>=18) starAlpha=Math.max(0,(totalH-18)/2);
    else starAlpha=Math.max(0,(7-totalH));
  }
  document.querySelectorAll('[data-star]').forEach(s=>{
    s.style.opacity = starAlpha>0 ? '' : '0';
    s.style.visibility = starAlpha>0 ? '' : 'hidden';
  });

  // ── Celestial body ──
  const cel=document.getElementById('celestial');
  const isDay=H>=6&&H<20;
  if(isDay){
    const p=(totalH-6)/14;
    const cx=8+p*84;
    const cy=72-Math.sin(p*Math.PI)*62;
    cel.style.cssText=`left:${cx}%;top:${cy}%;width:68px;height:68px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#fff176,#ffd600);box-shadow:0 0 36px 18px rgba(255,214,0,0.45),0 0 80px 40px rgba(255,200,0,0.18);transform:translate(-50%,-50%);position:absolute;`;
  } else {
    let mp;
    if(H>=20) mp=(totalH-20)/10; else mp=(totalH+4)/10;
    mp=Math.max(0,Math.min(1,mp));
    const cx=8+mp*84, cy=68-Math.sin(mp*Math.PI)*55;
    cel.style.cssText=`left:${cx}%;top:${cy}%;width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fffde7,#fff9c4,#f5e642);box-shadow:0 0 24px 12px rgba(255,249,196,0.35),0 0 50px 25px rgba(255,248,180,0.12);transform:translate(-50%,-50%);position:absolute;`;
  }

  // ── Clouds opacity ──
  const cloudAlpha=isNight?0.3:isDusk?0.6:1;
  document.querySelectorAll('[data-cloud]').forEach(c=>c.style.opacity=cloudAlpha);

  // ── Fireflies ──
  const showFF=H>=19||H<6;
  document.querySelectorAll('.firefly').forEach(f=>f.style.display=showFF?'block':'none');

  // ── Butterflies ──
  const showBF=H>=8&&H<18;
  document.querySelectorAll('.butterfly').forEach(b=>b.style.display=showBF?'block':'none');

  // ── Weather ──
  document.getElementById('weather-icon').textContent=weatherObj.icon;
  document.getElementById('weather-text').textContent=weatherObj.text;

  // ── Shooting stars ──
  maybeShootingStar(H);
}

// ──────────────────────────────────────────
//  BOOT
// ──────────────────────────────────────────
initStars();
initClouds();
initCelestial();
initFireflies();
initButterflies();
updateScene();
setInterval(updateScene, 1000);
setInterval(pickWeather, 3600000);
</script>

// ──────────────────────────────────────────
//  SOUND ENGINE  (Web Audio API)
// ──────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _actx = null;
function ctx() {
  if (!_actx) _actx = new AudioCtx();
  if (_actx.state === 'suspended') _actx.resume();
  return _actx;
}

function playTick(vol = 0.18) {
  const c = ctx(), o = c.createOscillator(), g = c.createGain();
  o.connect(g); g.connect(c.destination);
  o.frequency.value = 700 + Math.random() * 300;
  g.gain.setValueAtTime(vol, c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.055);
  o.start(); o.stop(c.currentTime + 0.055);
}

function playSpinStart() {
  const c = ctx(), o = c.createOscillator(), g = c.createGain();
  o.connect(g); g.connect(c.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(260, c.currentTime);
  o.frequency.exponentialRampToValueAtTime(90, c.currentTime + 0.28);
  g.gain.setValueAtTime(0.22, c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.28);
  o.start(); o.stop(c.currentTime + 0.28);
}

function playRevealSound(rarity) {
  const c = ctx();
  if (rarity === 'normal') {
    [523, 659, 784].forEach((freq, i) => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine'; o.frequency.value = freq;
      const t = c.currentTime + i * 0.11;
      g.gain.setValueAtTime(0.001, t);
      g.gain.linearRampToValueAtTime(0.28, t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.36);
      o.start(t); o.stop(t + 0.36);
    });
  } else if (rarity === 'rare') {
    [392, 523, 659, 784, 1047].forEach((freq, i) => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'triangle'; o.frequency.value = freq;
      const t = c.currentTime + i * 0.09;
      g.gain.setValueAtTime(0.001, t);
      g.gain.linearRampToValueAtTime(0.32, t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.44);
      o.start(t); o.stop(t + 0.44);
    });
    // shimmer layer
    [1568, 2093].forEach((freq, i) => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine'; o.frequency.value = freq;
      const t = c.currentTime + 0.38 + i * 0.1;
      g.gain.setValueAtTime(0.001, t);
      g.gain.linearRampToValueAtTime(0.14, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      o.start(t); o.stop(t + 0.5);
    });
  } else {
    // ultra: dramatic ascending fanfare + sustained chord
    [196, 247, 294, 392, 523, 659, 784, 1047].forEach((freq, i) => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine'; o.frequency.value = freq;
      const t = c.currentTime + i * 0.075;
      g.gain.setValueAtTime(0.001, t);
      g.gain.linearRampToValueAtTime(0.35, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      o.start(t); o.stop(t + 0.5);
    });
    // sustained triumphant chord
    [523, 659, 784, 1047].forEach(freq => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine'; o.frequency.value = freq;
      const t = c.currentTime + 0.6;
      g.gain.setValueAtTime(0.22, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 1.6);
      o.start(t); o.stop(t + 1.6);
    });
  }
}

// ──────────────────────────────────────────
//  COLLECTION SYSTEM
// ──────────────────────────────────────────
const COLL_KEY = 'acnh_gacha_collection';

function getCollection() {
  try { return new Set(JSON.parse(localStorage.getItem(COLL_KEY) || '[]')); }
  catch { return new Set(); }
}
function saveCollection(set) {
  localStorage.setItem(COLL_KEY, JSON.stringify([...set]));
}

let collection = getCollection();

function addToCollection(idx) {
  const isNew = !collection.has(idx);
  collection.add(idx);
  saveCollection(collection);
  updateCollectionUI();
  return isNew;
}

function updateCollectionUI() {
  const total = GACHA.length;
  const have = collection.size;
  const pct = (have / total * 100).toFixed(0);
  document.getElementById('coll-count').textContent = `${have}/${total}`;
  document.getElementById('coll-progress-text').textContent = `${have} / ${total}`;
  document.getElementById('coll-progress-bar').style.width = pct + '%';
  renderCollectionGrids();
}

function renderCollectionGrids() {
  const grids = { normal: document.getElementById('grid-normal'), rare: document.getElementById('grid-rare'), ultra: document.getElementById('grid-ultra') };

  GACHA.forEach((c, idx) => {
    const have = collection.has(idx);
    const card = document.createElement('div');
    card.className = 'coll-card ' + (have ? 'collected' : 'locked');

    const dot = (c.rarity !== 'normal') ? `<div class="rarity-dot ${c.rarity}"></div>` : '';

    const nameClass = have ? '' : 'unknown';

// ──────────────────────────────────────────
//  WHEEL SETUP
// ──────────────────────────────────────────
const COLORS = [
  '#b8e4b8','#fcd9b0','#aae6aa','#fbb8cc','#f5cb98',
  '#f0a870','#c0c8d4','#e8d4d4','#f4f4d8','#fbbcc8',
  '#fce898','#f4d888','#c4d8f0','#ccaa80',
  '#c4a8fc','#f0b0e8','#8aec9a','#fcd4a0','#84dccf','#fce86a'
];

const N = 20, SEG = 360 / N;

function wRandom() {
  const pool = [];
  GACHA.forEach((c, i) => {
    const w = c.rarity === 'normal' ? 10 : c.rarity === 'rare' ? 3 : 1;
    for (let j = 0; j < w; j++) pool.push(i);
  });
  return pool[Math.floor(Math.random() * pool.length)];
}

let deg = 0, spinning = false;

function drawWheel() {
  const cv = document.getElementById('wheel-canvas');
  if (!cv) return;
  const ctx2d = cv.getContext('2d');
  const cx = 100, cy = 100, r = 96;
  ctx2d.clearRect(0, 0, 200, 200);
  const arc = 2 * Math.PI / N;
  const rot = deg * Math.PI / 180 - Math.PI / 2;

  for (let i = 0; i < N; i++) {
    const a = rot + i * arc, b = a + arc;
    ctx2d.beginPath(); ctx2d.moveTo(cx, cy); ctx2d.arc(cx, cy, r, a, b); ctx2d.closePath();
    ctx2d.fillStyle = COLORS[i]; ctx2d.fill();
    ctx2d.strokeStyle = 'rgba(255,255,255,0.55)'; ctx2d.lineWidth = 1.5; ctx2d.stroke();

    const mid = a + arc / 2;
    const ex = cx + Math.cos(mid) * r * 0.7, ey = cy + Math.sin(mid) * r * 0.7;
    ctx2d.save(); ctx2d.translate(ex, ey);
    ctx2d.font = '15px serif'; ctx2d.textAlign = 'center'; ctx2d.textBaseline = 'middle';
    ctx2d.fillText(GACHA[i].emoji, 0, 0); ctx2d.restore();

    if (GACHA[i].rarity !== 'normal') {
      const dx = cx + Math.cos(mid) * r * 0.46, dy = cy + Math.sin(mid) * r * 0.46;
      ctx2d.beginPath(); ctx2d.arc(dx, dy, 4, 0, 2 * Math.PI);
      ctx2d.fillStyle = GACHA[i].rarity === 'ultra' ? '#ffd700' : '#ff69b4';
      ctx2d.fill();
    }
  }

  ctx2d.beginPath(); ctx2d.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx2d.strokeStyle = '#d4aa55'; ctx2d.lineWidth = 5; ctx2d.stroke();
  ctx2d.beginPath(); ctx2d.arc(cx, cy, r - 3.5, 0, 2 * Math.PI);
  ctx2d.strokeStyle = 'rgba(255,255,255,0.22)'; ctx2d.lineWidth = 3; ctx2d.stroke();
  ctx2d.beginPath(); ctx2d.arc(cx, cy, 24, 0, 2 * Math.PI);
  ctx2d.fillStyle = 'rgba(255,251,230,.96)'; ctx2d.fill();
  ctx2d.strokeStyle = '#d4aa55'; ctx2d.lineWidth = 3; ctx2d.stroke();
}

function spinWheel() {
  if (spinning) return;
  spinning = true;
  playSpinStart();
  const btn = document.getElementById('spin-btn');
  if (btn) { btn.disabled = true; btn.textContent = '🌀'; }

  const idx = wRandom();
  let target = -(idx * SEG + SEG / 2);
  const minT = deg + 5 * 360;
  while (target < minT) target += 360;
  target += (Math.random() - 0.5) * SEG * 0.55;

  const dur = 4200, t0 = performance.now(), from = deg, delta = target - from;
  function ease(t) { return 1 - Math.pow(1 - t, 4); }

  let prevSeg = -1;
  function frame(now) {
    const t = Math.min((now - t0) / dur, 1);
    deg = from + delta * ease(t);
    drawWheel();

    // tick on segment crossing
    const normDeg = ((deg % 360) + 360) % 360;
    const curSeg = Math.floor(normDeg / SEG);
    if (prevSeg !== -1 && curSeg !== prevSeg) {
      const vol = Math.max(0.04, 0.22 * (1 - ease(t) * 0.85));
      playTick(vol);
    }
    prevSeg = curSeg;

    if (t < 1) { requestAnimationFrame(frame); }
    else {
      deg = target; spinning = false;
      if (btn) { btn.disabled = false; btn.textContent = '🎰'; }
      setTimeout(() => reveal(idx), 380);
    }
  }
  requestAnimationFrame(frame);
}

function reveal(idx) {
  const c = GACHA[idx];
  addToCollection(idx);
  playRevealSound(c.rarity);

  if (c.rarity === 'ultra') { showUltra(c); return; }

  const modal = document.getElementById('reveal-modal');
  document.getElementById('rv-emoji').textContent = c.emoji;
  document.getElementById('rv-name').textContent = c.name;
  document.getElementById('rv-meta').textContent = `${c.species} · ${c.personality}`;
  document.getElementById('rv-desc').textContent = c.desc;

  const tag = document.getElementById('rv-tag');
  if (c.rarity === 'rare') {
    tag.textContent = '✨ 稀有！'; tag.className = 'rv-tag rare';
    modal.className = 'reveal-rare';
    burst(42, '#ffd700'); burst(28, '#ff80c0');
  } else {
    tag.textContent = '普通'; tag.className = 'rv-tag normal';
    modal.className = 'reveal-normal';
    burst(14, '#c8e8c8');
  }
  const em = document.getElementById('rv-emoji');
  em.style.animation = 'none'; void em.offsetWidth; em.style.animation = '';
  modal.style.display = 'flex';
}

function closeReveal() { document.getElementById('reveal-modal').style.display = 'none'; }

function showUltra(c) {
  const scr = document.getElementById('ultra-screen');
  document.getElementById('ultra-emoji').textContent = c.emoji;
  document.getElementById('ultra-name').textContent = c.name;
  document.getElementById('ultra-desc').textContent = c.desc;
  scr.style.display = 'flex';
  document.body.classList.add('screen-shake');
  setTimeout(() => document.body.classList.remove('screen-shake'), 600);
  spawnStars(scr);
  for (let i = 0; i < 7; i++) setTimeout(fireworks, i * 320);
}

function closeUltra() {
  document.getElementById('ultra-screen').style.display = 'none';
  document.querySelectorAll('.ultra-star').forEach(s => s.remove());
}

function spawnStars(parent) {
  const icons = ['⭐', '✨', '🌟', '💫', '⚡'];
  for (let i = 0; i < 28; i++) {
    const s = document.createElement('div');
    s.className = 'ultra-star';
    s.textContent = icons[i % icons.length];
    const dur = 2 + Math.random() * 4;
    s.style.cssText = `left:${Math.random() * 100}%;top:${Math.random() * 100}%;animation-duration:${dur}s;animation-delay:${-Math.random() * dur}s;font-size:${10 + Math.random() * 18}px;`;
    parent.appendChild(s);
  }
}

function burst(n, color) {
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    const ang = Math.random() * 360, dist = 55 + Math.random() * 155, sz = 5 + Math.random() * 7;
    p.style.cssText = `position:fixed;left:50%;top:50%;width:${sz}px;height:${sz}px;border-radius:50%;background:${color};box-shadow:0 0 6px ${color};pointer-events:none;z-index:999;animation:particleFly 1.1s ease-out forwards;animation-delay:${Math.random() * 0.22}s;--dx:${Math.cos(ang * Math.PI / 180) * dist}px;--dy:${Math.sin(ang * Math.PI / 180) * dist}px;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1550);
  }
}

function fireworks() {
  const cols = ['#ff0', '#f80', '#f0f', '#0ff', '#0f0', '#f00', '#fff'];
  const cx = 18 + Math.random() * 64 + '%', cy = 8 + Math.random() * 58 + '%';
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    const ang = Math.random() * 360, dist = 65 + Math.random() * 210, sz = 3 + Math.random() * 6;
    const col = cols[i % cols.length];
    p.style.cssText = `position:fixed;left:${cx};top:${cy};width:${sz}px;height:${sz}px;border-radius:50%;background:${col};box-shadow:0 0 8px ${col};pointer-events:none;z-index:3000;animation:particleFly 1.4s ease-out forwards;--dx:${Math.cos(ang * Math.PI / 180) * dist}px;--dy:${Math.sin(ang * Math.PI / 180) * dist}px;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1750);
  }
}

window.spinWheel = spinWheel;
window.closeReveal = closeReveal;
window.closeUltra = closeUltra;
drawWheel();
updateCollectionUI();
})();
</script>

<script>
const BGM = (function () {
  const AC = window.AudioContext || window.webkitAudioContext;
  let _ctx = null, master = null;
  let playing = false;
  let melTimer = null, chordTimer = null, bassTimer = null;

  const BPM = 88;
  const Q = 60 / BPM; // quarter note ≈ 0.682 s

  // C major pentatonic across 3 octaves
  const S = [
    130.81, 146.83, 164.81, 196.00, 220.00,   // 0–4:  C3 D3 E3 G3 A3
    261.63, 293.66, 329.63, 392.00, 440.00,   // 5–9:  C4 D4 E4 G4 A4
    523.25, 587.33, 659.25, 783.99, 880.00    // 10–14: C5 D5 E5 G5 A5
  ];

  function ac() {
    if (!_ctx) {
      _ctx = new AC();
      master = _ctx.createGain();
      master.gain.value = 0;
      master.connect(_ctx.destination);
    }
    if (_ctx.state === 'suspended') _ctx.resume();
    return _ctx;
  }

  // Piano-like tone: sine fundamental + 2 quiet harmonics
  function piano(freq, t, dur, vol) {
    const c = ac();
    [1, 2, 3].forEach((h, i) => {
      const v = [vol, vol * 0.20, vol * 0.05][i];
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sine';
      o.frequency.value = freq * h;
      o.connect(g); g.connect(master);
      const atk = 0.010, dcy = 0.14;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(v, t + atk);
      g.gain.exponentialRampToValueAtTime(v * 0.28, t + atk + dcy);
      const susEnd = t + dur - 0.35;
      if (susEnd > t + atk + dcy) g.gain.setValueAtTime(v * 0.28, susEnd);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t); o.stop(t + dur + 0.06);
    });
  }

  // Time-of-day musical region
  function tod() {
    const h = new Date().getHours();
    if (h >= 20 || h < 5)  return { lo: 2,  hi: 9,  vol: 0.11, spd: 1.3  }; // 深夜: 低沉、缓慢
    if (h >= 5  && h < 7)  return { lo: 4,  hi: 11, vol: 0.13, spd: 1.1  }; // 黎明: 渐渐明亮
    if (h >= 7  && h < 18) return { lo: 5,  hi: 13, vol: 0.16, spd: 1.0  }; // 白天: 明朗
    return                         { lo: 3,  hi: 11, vol: 0.13, spd: 1.18 }; // 黄昏: 稍慢、温暖
  }

  let mi = 8; // melody cursor, starts at G4

  function scheduleMel() {
    if (!playing) return;
    const c = ac();
    const { lo, hi, vol, spd } = tod();
    const now = c.currentTime;
    const len = 4 + Math.floor(Math.random() * 4);
    let cur = Math.max(lo, Math.min(hi, mi));

    for (let i = 0; i < len; i++) {
      let step = Math.floor(Math.random() * 3) - 1;
      if (Math.random() < 0.12) step = step * 2;
      cur = Math.max(lo, Math.min(hi, cur + step));
      const tOff = now + i * Q * spd * (0.88 + Math.random() * 0.38);
      const dur  = Q * spd * (Math.random() < 0.28 ? 1.75 : 1.0) * 0.90;
      piano(S[cur], tOff, dur, vol * (0.78 + Math.random() * 0.22));

      // Occasional soft harmony (a 3rd above/below)
      if (Math.random() < 0.16) {
        const hi2 = Math.max(lo, Math.min(hi, cur + (Math.random() < 0.5 ? 2 : -2)));
        piano(S[hi2], tOff + 0.018, dur * 0.85, vol * 0.40);
      }
    }
    mi = cur;

    const phraseMs = len * Q * spd * 1000;
    const pauseMs  = Q * spd * 1000 * (1.8 + Math.random() * 2.5);
    melTimer = setTimeout(scheduleMel, phraseMs + pauseMs);
  }

  function scheduleChord() {
    if (!playing) return;
    const c = ac();
    const { vol, spd } = tod();
    const now = c.currentTime;

    // Soft pad chords (an octave below melody), strum-like
    const shapes = [[5, 8, 10], [7, 10, 12], [5, 7, 9], [8, 10, 13]];
    const sh = shapes[Math.floor(Math.random() * shapes.length)];
    sh.forEach((si, i) => {
      setTimeout(() => {
        if (!playing) return;
        piano(S[si] * 0.5, ac().currentTime, Q * spd * 5.5, vol * 0.30);
      }, i * 40);
    });

    chordTimer = setTimeout(scheduleChord, Q * spd * 1000 * (5 + Math.random() * 4));
  }

  function scheduleBass() {
    if (!playing) return;
    const c = ac();
    const { vol, spd } = tod();
    const now = c.currentTime;

    // Very soft bass: C2, G2, or D2
    const freqs = [65.41, 98.00, 73.42];
    const f = freqs[Math.floor(Math.random() * freqs.length)];
    piano(f, now, Q * spd * 2.2, vol * 0.50);

    bassTimer = setTimeout(scheduleBass, Q * spd * 1000 * (2 + Math.random() * 2.5));
  }

  function start() {
    if (playing) return;
    ac();
    playing = true;
    master.gain.cancelScheduledValues(_ctx.currentTime);
    master.gain.setValueAtTime(master.gain.value, _ctx.currentTime);
    master.gain.linearRampToValueAtTime(1.0, _ctx.currentTime + 4.0);
    scheduleMel();
    setTimeout(scheduleChord, 1800);
    setTimeout(scheduleBass,  900);
  }

  function stop() {
    if (!playing) return;
    playing = false;
    clearTimeout(melTimer); clearTimeout(chordTimer); clearTimeout(bassTimer);
    if (master && _ctx) {
      master.gain.cancelScheduledValues(_ctx.currentTime);
      master.gain.setValueAtTime(master.gain.value, _ctx.currentTime);
      master.gain.linearRampToValueAtTime(0, _ctx.currentTime + 2.5);
    }
  }

  function toggle() { playing ? stop() : start(); return playing; }

  return { start, stop, toggle, isPlaying: () => playing };
})();

// Auto-start on first user interaction (browser autoplay policy)
document.addEventListener('click', function _boot() {
  BGM.start();
  _updateMusicBtn();
  document.removeEventListener('click', _boot);
}, { capture: true });

function toggleBGM() {
  BGM.toggle();
  _updateMusicBtn();
}

function _updateMusicBtn() {
  const btn = document.getElementById('music-btn');
  const lbl = document.getElementById('music-label');
  if (!btn) return;
  if (BGM.isPlaying()) {
    btn.classList.remove('muted');
    lbl.textContent = '音乐';
  } else {
    btn.classList.add('muted');
    lbl.textContent = '已静音';
  }
}

window.toggleBGM = toggleBGM;
</script>
</body>
</html>
