<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 动物森友会时钟</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  position: relative;
  user-select: none;
}

/* ===== SKY ===== */
#sky {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 62%;
  transition: background 4s ease;
  overflow: hidden;
}

/* ===== CELESTIAL BODY ===== */
#celestial {
  position: absolute;
  border-radius: 50%;
  transition: top 8s linear, left 8s linear, width 3s, height 3s,
              box-shadow 3s, background 3s;
  z-index: 5;
}

/* Stars */
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  transition: opacity 2s ease;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
  0%  { opacity: 0.2; transform: scale(0.8); }
  100%{ opacity: 1;   transform: scale(1.3); }
}

/* Clouds */
.cloud {
  position: absolute;
  animation: floatCloud linear infinite;
  font-size: 48px;
  z-index: 3;
  transition: opacity 3s;
}
@keyframes floatCloud {
  from { transform: translateX(-150px); }
  to   { transform: translateX(calc(100vw + 150px)); }
}

/* Shooting star */
.shoot {
  position: absolute;
  width: 2px;
  height: 90px;
  background: linear-gradient(to bottom, transparent, #fffde7, transparent);
  transform-origin: top center;
  animation: shootAnim 1.2s linear forwards;
  z-index: 6;
}
@keyframes shootAnim {
  0%  { opacity:1; transform: rotate(-40deg) translateY(0); }
  100%{ opacity:0; transform: rotate(-40deg) translateY(380px); }
}

/* ===== GROUND AREA ===== */
#ground {
  position: absolute;
  bottom: 0; left: 0;
  width: 100%;
  height: 38%;
  overflow: hidden;
  transition: background 4s ease;
}
#grass-strip {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 28px;
  border-radius: 50% 50% 0 0 / 18px 18px 0 0;
  transition: background 4s ease;
}
#soil {
  position: absolute;
  top: 20px; left: 0;
  width: 100%;
  height: 100%;
  transition: background 4s ease;
}

/* Path / dirt road */
#path {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 160px;
  height: 95%;
  background: repeating-linear-gradient(
    to bottom,
    #c9a86c 0px, #c9a86c 28px,
    #b8966a 28px, #b8966a 30px
  );
  border-left: 3px solid #b0894a;
  border-right: 3px solid #b0894a;
  border-radius: 6px 6px 0 0;
  opacity: 0.55;
}

/* Trees */
.tree {
  position: absolute;
  bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.tree-crown {
  font-size: 62px;
  line-height: 1;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.18));
  animation: sway 4s ease-in-out infinite alternate;
}
.tree-trunk {
  width: 14px;
  height: 28px;
  background: linear-gradient(to right, #7a5430, #a0733a, #7a5430);
  border-radius: 4px;
  margin-top: -8px;
}
@keyframes sway {
  from { transform: rotate(-3deg); }
  to   { transform: rotate(3deg); }
}

/* Flowers */
.flower {
  position: absolute;
  font-size: 22px;
  bottom: 22px;
  animation: flowerSway 3s ease-in-out infinite alternate;
  filter: drop-shadow(0 2px 2px rgba(0,0,0,0.15));
  z-index: 2;
}
@keyframes flowerSway {
  from { transform: rotate(-8deg) scale(0.95); }
  to   { transform: rotate(8deg) scale(1.05); }
}

/* Fireflies */
.firefly {
  position: absolute;
  width: 5px;
  height: 5px;
  background: #f0ff80;
  border-radius: 50%;
  box-shadow: 0 0 6px 3px rgba(200,255,100,0.8);
  animation: fireflyDrift ease-in-out infinite;
  z-index: 8;
}
@keyframes fireflyDrift {
  0%  { opacity:0;   transform:translate(0,0); }
  20% { opacity:1;   transform:translate(15px,-20px); }
  50% { opacity:0.6; transform:translate(-10px,-38px); }
  80% { opacity:1;   transform:translate(22px,-18px); }
  100%{ opacity:0;   transform:translate(0,0); }
}

/* Butterflies */
.butterfly {
  position: absolute;
  font-size: 18px;
  animation: butterflyFly ease-in-out infinite;
  z-index: 7;
}
@keyframes butterflyFly {
  0%  { transform:translate(0,0) rotate(0deg); }
  25% { transform:translate(40px,-25px) rotate(8deg); }
  50% { transform:translate(80px,8px) rotate(-5deg); }
  75% { transform:translate(40px,-18px) rotate(5deg); }
  100%{ transform:translate(0,0) rotate(0deg); }
}

/* Snow particles */
.snowflake {
  position: absolute;
  font-size: 14px;
  animation: snowFall linear infinite;
  opacity: 0.8;
  z-index: 9;
}
@keyframes snowFall {
  0%  { transform: translateY(-20px) translateX(0) rotate(0deg); opacity:0; }
  10% { opacity:0.9; }
  90% { opacity:0.7; }
  100%{ transform: translateY(110vh) translateX(30px) rotate(360deg); opacity:0; }
}

/* Cherry blossom petals */
.petal {
  position: absolute;
  font-size: 12px;
  animation: petalFall linear infinite;
  z-index: 9;
  opacity: 0.8;
}
@keyframes petalFall {
  0%  { transform: translateY(-10px) translateX(0) rotate(0deg); opacity:0; }
  15% { opacity:1; }
  100%{ transform: translateY(110vh) translateX(60px) rotate(720deg); opacity:0; }
}

/* ===== CLOCK PANEL ===== */
#panel {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
  background: rgba(255, 251, 230, 0.93);
  border-radius: 28px;
  padding: 24px 44px 20px;
  text-align: center;
  border: 4px solid #d4aa55;
  box-shadow:
    0 10px 40px rgba(0,0,0,0.22),
    inset 0 0 0 2px rgba(255,255,255,0.6),
    0 0 0 7px rgba(212,170,85,0.18);
  min-width: 340px;
  z-index: 100;
  backdrop-filter: blur(4px);
}

/* Leaf decoration corners */
#panel::before, #panel::after {
  content: '🍃';
  position: absolute;
  font-size: 20px;
}
#panel::before { top: -4px; left: 12px; transform: rotate(-30deg); }
#panel::after  { top: -4px; right: 12px; transform: rotate(30deg) scaleX(-1); }

#island-name {
  font-size: 11px;
  color: #9a7820;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 4px;
  opacity: 0.8;
}

#greeting {
  font-size: 19px;
  font-weight: 800;
  margin-bottom: 8px;
  transition: color 3s ease;
}

#time-main {
  font-size: 78px;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -3px;
  color: #2e4e10;
  text-shadow: 2px 3px 0 rgba(255,255,255,0.7);
  transition: color 3s ease;
}

#time-seconds {
  font-size: 32px;
  font-weight: 800;
  color: #6a8c2e;
  vertical-align: super;
  margin-left: 4px;
}

#ampm {
  font-size: 14px;
  font-weight: 800;
  color: #9a8040;
  letter-spacing: 1px;
  margin-top: 2px;
}

#date-line {
  font-size: 17px;
  font-weight: 700;
  color: #5a7a25;
  margin-top: 8px;
}

#weather-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 10px;
  font-size: 13px;
  color: #7a6020;
  font-weight: 700;
}

.weather-icon { font-size: 26px; }

.divider {
  width: 80%;
  height: 2px;
  background: linear-gradient(to right, transparent, #d4aa55, transparent);
  margin: 12px auto 10px;
  border-radius: 2px;
}

#badge-row {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.badge {
  background: linear-gradient(135deg, #6cc06c, #4aa04a);
  color: white;
  border-radius: 12px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.5px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

#char-row {
  margin-top: 10px;
  font-size: 34px;
  line-height: 1;
  animation: charBounce 2.4s ease-in-out infinite;
}
@keyframes charBounce {
  0%,100%{ transform:translateY(0) scale(1); }
  50%    { transform:translateY(-6px) scale(1.08); }
}

/* Season badge */
#season-badge {
  position: fixed;
  top: 18px;
  right: 20px;
  background: rgba(255, 251, 230, 0.92);
  border: 3px solid #d4aa55;
  border-radius: 18px;
  padding: 6px 14px;
  font-size: 14px;
  font-weight: 800;
  color: #8a6a18;
  z-index: 200;
  box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}

/* Time of day badge */
#tod-badge {
  position: fixed;
  top: 18px;
  left: 20px;
  background: rgba(255, 251, 230, 0.92);
  border: 3px solid #d4aa55;
  border-radius: 18px;
  padding: 6px 14px;
  font-size: 14px;
  font-weight: 800;
  color: #5a3a10;
  z-index: 200;
  box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}

/* Seconds progress bar */
#progress-wrap {
  width: 80%;
  height: 6px;
  background: rgba(0,0,0,0.08);
  border-radius: 3px;
  margin: 10px auto 0;
  overflow: hidden;
}
#progress-bar {
  height: 100%;
  background: linear-gradient(to right, #6cc06c, #a8e060);
  border-radius: 3px;
  transition: width 1s linear;
}

/* ===== GACHA WHEEL ===== */
#gacha-wrap{position:absolute;bottom:3%;left:50%;transform:translateX(-50%);z-index:110;text-align:center;}
#wheel-outer{position:relative;width:200px;height:200px;margin:0 auto;cursor:pointer;filter:drop-shadow(0 8px 22px rgba(0,0,0,0.42));}
#wheel-pointer{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-top:22px solid #d4aa55;z-index:5;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.45));}
#wheel-canvas{width:200px;height:200px;border-radius:50%;display:block;}
#spin-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#fffde7,#f9c800);border:3px solid #c8941a;box-shadow:0 3px 14px rgba(0,0,0,0.35),inset 0 1px 5px rgba(255,255,255,0.7);font-size:22px;cursor:pointer;z-index:10;transition:transform .12s,box-shadow .12s;outline:none;font-family:'Nunito',sans-serif;}
#spin-btn:not(:disabled):hover{transform:translate(-50%,-50%) scale(1.1);box-shadow:0 6px 22px rgba(0,0,0,0.42),inset 0 1px 5px rgba(255,255,255,0.7);}
#spin-btn:not(:disabled):active{transform:translate(-50%,-50%) scale(0.92);}
#spin-btn:disabled{opacity:.75;cursor:not-allowed;}
#gacha-label{margin-top:7px;font-size:12px;font-weight:800;color:rgba(255,255,220,0.93);text-shadow:0 1px 5px rgba(0,0,0,0.6);letter-spacing:.5px;}

/* Reveal modal */
#reveal-modal{display:none;position:fixed;inset:0;z-index:500;align-items:center;justify-content:center;}
#reveal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.52);}
#reveal-card{position:relative;background:rgba(255,251,230,.97);border-radius:28px;padding:30px 46px 26px;text-align:center;min-width:240px;z-index:1;animation:revealPop .44s cubic-bezier(.34,1.56,.64,1) forwards;}
.reveal-normal #reveal-card{border:4px solid #d4aa55;box-shadow:0 16px 44px rgba(0,0,0,.3);}
.reveal-rare   #reveal-card{border:4px solid #ffd700;box-shadow:0 0 52px rgba(255,215,0,.6),0 16px 48px rgba(0,0,0,.4);background:linear-gradient(135deg,rgba(255,251,220,.97),rgba(255,245,175,.97));}
@keyframes revealPop{0%{transform:scale(.3) translateY(50px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
#rv-emoji{font-size:76px;line-height:1;display:block;margin-bottom:10px;animation:emojiSpin .56s ease-out forwards;}
@keyframes emojiSpin{0%{transform:scale(0) rotate(-180deg)}65%{transform:scale(1.15) rotate(12deg)}100%{transform:scale(1) rotate(0)}}
#rv-name{font-size:22px;font-weight:900;color:#3a3a1a;margin-bottom:8px;}
.rv-tag{display:inline-block;border-radius:14px;padding:4px 16px;font-size:13px;font-weight:800;margin-bottom:18px;}
.rv-tag.normal{background:#d4f0d4;color:#2a6a2a;border:2px solid #8acc8a;}
.rv-tag.rare{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#fff;border:none;box-shadow:0 2px 14px rgba(255,200,0,.55);font-size:15px;animation:rarePulse 1s ease-in-out infinite alternate;}
@keyframes rarePulse{from{box-shadow:0 2px 14px rgba(255,200,0,.55)}to{box-shadow:0 4px 28px rgba(255,140,0,.85)}}
#rv-close{display:block;margin:0 auto;background:linear-gradient(135deg,#6cc06c,#4aa04a);color:#fff;border:none;border-radius:20px;padding:8px 28px;font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.2);transition:transform .1s;}
#rv-close:hover{transform:scale(1.06);}

/* Ultra rare full screen */
#ultra-screen{display:none;position:fixed;inset:0;z-index:600;align-items:center;justify-content:center;flex-direction:column;overflow:hidden;}
#ultra-bg{position:absolute;inset:0;animation:ultraBgAnim 3s ease-in-out infinite alternate;}
@keyframes ultraBgAnim{0%{background:linear-gradient(135deg,#0d0030,#1a0050,#000820)}50%{background:linear-gradient(135deg,#001a40,#400020,#002010)}100%{background:linear-gradient(135deg,#200040,#003020,#400010)}}
#ultra-content{position:relative;z-index:2;text-align:center;padding:20px;}
#ultra-title{font-size:36px;font-weight:900;background:linear-gradient(90deg,#ff0,#f80,#f0f,#0ff,#0f0,#ff0);background-size:400% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:rainbowShift 1.2s linear infinite;margin-bottom:14px;letter-spacing:3px;}
@keyframes rainbowShift{from{background-position:0%}to{background-position:400%}}
#ultra-emoji{font-size:110px;line-height:1;display:block;margin-bottom:14px;animation:ultraFloat 2s ease-in-out infinite alternate,ultraGlow 1s ease-in-out infinite alternate;}
@keyframes ultraFloat{from{transform:translateY(0) scale(1)}to{transform:translateY(-20px) scale(1.08)}}
@keyframes ultraGlow{from{filter:drop-shadow(0 0 20px #ff0) drop-shadow(0 0 40px #f80)}to{filter:drop-shadow(0 0 32px #f0f) drop-shadow(0 0 64px #0ff)}}
#ultra-name{font-size:30px;font-weight:900;color:#fff;text-shadow:0 0 22px #ffd700,0 0 44px #ff8c00;margin-bottom:8px;}
#ultra-subtitle{font-size:14px;color:rgba(255,255,190,.88);font-weight:700;margin-bottom:26px;animation:ultraSubPulse 1.5s ease-in-out infinite alternate;}
@keyframes ultraSubPulse{from{opacity:.65}to{opacity:1}}
#ultra-close{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0000;border:none;border-radius:24px;padding:11px 40px;font-size:17px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;box-shadow:0 4px 22px rgba(255,180,0,.55);transition:transform .15s,box-shadow .15s;letter-spacing:1px;}
#ultra-close:hover{transform:scale(1.08);box-shadow:0 6px 34px rgba(255,180,0,.75);}
.ultra-star{position:absolute;animation:ultraStarFly linear infinite;pointer-events:none;}
@keyframes ultraStarFly{0%{opacity:0;transform:scale(0) rotate(0deg)}25%{opacity:1}75%{opacity:.8}100%{opacity:0;transform:scale(0) rotate(720deg) translateY(-120px)}}
@keyframes particleFly{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.1)}}
@keyframes screenShake{0%,100%{transform:translate(0,0)}20%{transform:translate(-6px,4px)}40%{transform:translate(6px,-4px)}60%{transform:translate(-4px,6px)}80%{transform:translate(4px,-5px)}}
body.screen-shake{animation:screenShake .5s ease-out;}
</style>
</head>

// ──────────────────────────────────────────
//  HELPERS
// ──────────────────────────────────────────
function hexToRgb(h) {
  const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
  return r?{r:parseInt(r[1],16),g:parseInt(r[2],16),b:parseInt(r[3],16)}:{r:0,g:0,b:0};
}
function lerpColor(c1,c2,t){
  const a=hexToRgb(c1),b=hexToRgb(c2);
  const r=Math.round(a.r+(b.r-a.r)*t);
  const g=Math.round(a.g+(b.g-a.g)*t);
  const bl=Math.round(a.b+(b.b-a.b)*t);
  return `rgb(${r},${g},${bl})`;
}
function interpTimeline(tl, totalH) {
  let prev=tl[0], next=tl[tl.length-1];
  for(let i=0;i<tl.length-1;i++){
    if(totalH>=tl[i].t && totalH<tl[i+1].t){ prev=tl[i]; next=tl[i+1]; break; }
  }
  const span = next.t - prev.t || 1;
  return (totalH - prev.t) / span;
}
function getStep(tl, totalH) {
  let res = tl[0];
  for(const s of tl) { if(totalH >= s.h || totalH >= s.t) res = s; }
  return res;
}
function getSeasonName(month) {
  if(month>=3&&month<=5) return 'spring';
  if(month>=6&&month<=8) return 'summer';
  if(month>=9&&month<=11) return 'autumn';
  return 'winter';
}

// ──────────────────────────────────────────
//  INITIALISE STATIC ELEMENTS
// ──────────────────────────────────────────
let currentSeason = '';

function initStars() {
  const sky = document.getElementById('sky');
  for(let i=0;i<120;i++){
    const s = document.createElement('div');
    s.className='star';
    const sz=Math.random()*2.5+0.8;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1+Math.random()*2}s;opacity:0;`;
    s.dataset.star='1';
    sky.appendChild(s);
  }
}

function initClouds() {
  const sky = document.getElementById('sky');
  const emojis = ['☁️','🌤️','⛅'];
  for(let i=0;i<6;i++){
    const c=document.createElement('div');
    c.className='cloud';
    c.dataset.cloud='1';
    const dur=35+Math.random()*40;
    c.style.cssText=`top:${5+Math.random()*55}%;font-size:${36+Math.random()*28}px;animation-duration:${dur}s;animation-delay:${-Math.random()*dur}s;`;
    c.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    sky.appendChild(c);
  }
}

function initCelestial() {
  const sky=document.getElementById('sky');
  let el=document.getElementById('celestial');
  if(!el){ el=document.createElement('div'); el.id='celestial'; sky.appendChild(el); }
}

function initTrees(seasonKey) {
  document.querySelectorAll('.tree').forEach(t=>t.remove());
  const g=document.getElementById('ground');
  const emoji = TREE_EMOJIS[seasonKey];
  [5,12,82,91].forEach((x,i)=>{
    const tree=document.createElement('div');
    tree.className='tree';
    tree.style.cssText=`left:${x}%;animation-delay:${i*0.6}s;`;
    tree.innerHTML=`<div class="tree-crown">${emoji}</div><div class="tree-trunk"></div>`;
    g.appendChild(tree);
  });
}

function initFlowers(seasonKey) {
  document.querySelectorAll('.flower').forEach(f=>f.remove());
  const g=document.getElementById('ground');
  const fl=SEASONS[seasonKey].flowers;
  [22,32,44,56,68,76].forEach((x,i)=>{
    const f=document.createElement('div');
    f.className='flower';
    f.style.cssText=`left:${x}%;animation-delay:${i*0.4}s;`;
    f.textContent=fl[i%fl.length];
    g.appendChild(f);
  });
}

function initFireflies() {
  document.querySelectorAll('.firefly').forEach(f=>f.remove());
  const g=document.getElementById('ground');
  for(let i=0;i<10;i++){
    const f=document.createElement('div');
    f.className='firefly';
    f.style.cssText=`left:${15+Math.random()*70}%;top:${5+Math.random()*60}%;animation-delay:${Math.random()*4}s;animation-duration:${3+Math.random()*3}s;display:none;`;
    g.appendChild(f);
  }
}

function initButterflies() {
  document.querySelectorAll('.butterfly').forEach(b=>b.remove());
  const sky=document.getElementById('sky');
  ['🦋','🐝','🦋'].forEach((em,i)=>{
    const b=document.createElement('div');
    b.className='butterfly';
    b.style.cssText=`left:${15+i*20}%;top:${45+Math.random()*30}%;animation-delay:${i*2.5}s;animation-duration:${7+i*2}s;display:none;`;
    b.textContent=em;
    sky.appendChild(b);
  });
}

let snowInterval=null, petalInterval=null;
function startSnow(on) {
  document.querySelectorAll('.snowflake').forEach(s=>s.remove());
  clearInterval(snowInterval);
  if(!on) return;
  const sky=document.getElementById('sky');
  const g=document.getElementById('ground');
  snowInterval=setInterval(()=>{
    const s=document.createElement('div');
    s.className='snowflake'; s.textContent='❄️';
    s.style.cssText=`left:${Math.random()*100}%;top:-20px;animation-duration:${5+Math.random()*5}s;font-size:${10+Math.random()*8}px;`;
    sky.appendChild(s);
    setTimeout(()=>s.remove(),12000);
  },600);
}
function startPetals(on) {
  document.querySelectorAll('.petal').forEach(p=>p.remove());
  clearInterval(petalInterval);
  if(!on) return;
  const sky=document.getElementById('sky');
  petalInterval=setInterval(()=>{
    const p=document.createElement('div');
    p.className='petal'; p.textContent='🌸';
    p.style.cssText=`left:${Math.random()*100}%;top:-10px;animation-duration:${6+Math.random()*6}s;font-size:${8+Math.random()*6}px;`;
    sky.appendChild(p);
    setTimeout(()=>p.remove(),14000);
  },900);
}

function maybeShootingStar(hours) {
  if((hours>=20||hours<6)&&Math.random()<0.004){
    const sky=document.getElementById('sky');
    const s=document.createElement('div');
    s.className='shoot';
    s.style.cssText=`left:${5+Math.random()*75}%;top:${Math.random()*35}%;`;
    sky.appendChild(s);
    setTimeout(()=>s.remove(),1500);
  }
}

// ──────────────────────────────────────────
//  SEASON INIT / RELOAD
// ──────────────────────────────────────────
function loadSeason(sk) {
  if(currentSeason===sk) return;
  currentSeason=sk;
  const sd=SEASONS[sk];
  document.getElementById('season-badge').textContent=`${sd.emoji} ${sd.name}`;
  initTrees(sk);
  initFlowers(sk);
  startSnow(sd.snow||false);
  startPetals(sd.petals||false);
}

// ──────────────────────────────────────────
//  MAIN UPDATE
// ──────────────────────────────────────────
let weatherObj = WEATHERS[1];
function pickWeather() { weatherObj=WEATHERS[Math.floor(Math.random()*WEATHERS.length)]; }
pickWeather();

function updateScene() {
  const now=new Date();
  const H=now.getHours(), M=now.getMinutes(), S=now.getSeconds();
  const totalH = H + M/60 + S/3600;
  const month = now.getMonth()+1;
  const sk = getSeasonName(month);
  loadSeason(sk);

  // ── Time display ──
  const hStr=String(H).padStart(2,'0');
  const mStr=String(M).padStart(2,'0');
  const sStr=String(S).padStart(2,'0');
  document.getElementById('time-main').innerHTML=`${hStr}:${mStr}<span id="time-seconds">:${sStr}</span>`;
  document.getElementById('ampm').textContent=(H<12?'午前 · AM':'午後 · PM');

  // ── Date ──
  const DAYS=['日','月','火','水','木','金','土'];
  document.getElementById('date-line').textContent=`${month}月${now.getDate()}日（${DAYS[now.getDay()]}）`;

  // ── Progress bar (seconds) ──
  document.getElementById('progress-bar').style.width=(S/60*100)+'%';

  // ── Greeting ──
  let greet=GREETINGS[0];
  for(const g of GREETINGS) if(H>=g.h) greet=g;
  document.getElementById('greeting').textContent=greet.text;
  document.getElementById('greeting').style.color=greet.color;

  // ── TOD badge + character ──
  let tod=TOD_INFO[0];
  for(const d of TOD_INFO) if(H>=d.h) tod=d;
  document.getElementById('tod-badge').textContent=tod.label;
  document.getElementById('char-row').textContent=tod.char;

  // ── Sky ──
  const si = interpTimeline(SKY_TIMELINE, totalH);
  let sp=SKY_TIMELINE[0], sn=SKY_TIMELINE[SKY_TIMELINE.length-1];
  for(let i=0;i<SKY_TIMELINE.length-1;i++){
    if(totalH>=SKY_TIMELINE[i].t&&totalH<SKY_TIMELINE[i+1].t){sp=SKY_TIMELINE[i];sn=SKY_TIMELINE[i+1];break;}
  }
  const t2=(totalH-sp.t)/((sn.t-sp.t)||1);
  const skyTop=lerpColor(sp.top,sn.top,t2);
  const skyBot=lerpColor(sp.bot,sn.bot,t2);
  document.getElementById('sky').style.background=`linear-gradient(to bottom,${skyTop},${skyBot})`;

  // ── Ground ──
  let gp=GROUND_TIMELINE[0],gn=GROUND_TIMELINE[GROUND_TIMELINE.length-1];
  for(let i=0;i<GROUND_TIMELINE.length-1;i++){
    if(totalH>=GROUND_TIMELINE[i].t&&totalH<GROUND_TIMELINE[i+1].t){gp=GROUND_TIMELINE[i];gn=GROUND_TIMELINE[i+1];break;}
  }
  const gt=(totalH-gp.t)/((gn.t-gp.t)||1);
  document.getElementById('grass-strip').style.background=lerpColor(gp.grass,gn.grass,gt);
  document.getElementById('soil').style.background=lerpColor(gp.soil,gn.soil,gt);

  // ── Stars ──
  const isNight=H>=20||H<6;
  const isDusk=(H>=18&&H<20)||(H>=5&&H<7);
  let starAlpha=0;
  if(isNight) starAlpha=1;
  else if(isDusk){
    if(H>=18) starAlpha=Math.max(0,(totalH-18)/2);
    else starAlpha=Math.max(0,(7-totalH));
  }
  document.querySelectorAll('[data-star]').forEach(s=>{
    s.style.opacity = starAlpha>0 ? '' : '0';
    s.style.visibility = starAlpha>0 ? '' : 'hidden';
  });

  // ── Celestial body ──
  const cel=document.getElementById('celestial');
  const isDay=H>=6&&H<20;
  if(isDay){
    const p=(totalH-6)/14;
    const cx=8+p*84;
    const cy=72-Math.sin(p*Math.PI)*62;
    cel.style.cssText=`left:${cx}%;top:${cy}%;width:68px;height:68px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#fff176,#ffd600);box-shadow:0 0 36px 18px rgba(255,214,0,0.45),0 0 80px 40px rgba(255,200,0,0.18);transform:translate(-50%,-50%);position:absolute;`;
  } else {
    let mp;
    if(H>=20) mp=(totalH-20)/10; else mp=(totalH+4)/10;
    mp=Math.max(0,Math.min(1,mp));
    const cx=8+mp*84, cy=68-Math.sin(mp*Math.PI)*55;
    cel.style.cssText=`left:${cx}%;top:${cy}%;width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fffde7,#fff9c4,#f5e642);box-shadow:0 0 24px 12px rgba(255,249,196,0.35),0 0 50px 25px rgba(255,248,180,0.12);transform:translate(-50%,-50%);position:absolute;`;
  }

  // ── Clouds opacity ──
  const cloudAlpha=isNight?0.3:isDusk?0.6:1;
  document.querySelectorAll('[data-cloud]').forEach(c=>c.style.opacity=cloudAlpha);

  // ── Fireflies ──
  const showFF=H>=19||H<6;
  document.querySelectorAll('.firefly').forEach(f=>f.style.display=showFF?'block':'none');

  // ── Butterflies ──
  const showBF=H>=8&&H<18;
  document.querySelectorAll('.butterfly').forEach(b=>b.style.display=showBF?'block':'none');

  // ── Weather ──
  document.getElementById('weather-icon').textContent=weatherObj.icon;
  document.getElementById('weather-text').textContent=weatherObj.text;

  // ── Shooting stars ──
  maybeShootingStar(H);
}

// ──────────────────────────────────────────
//  BOOT
// ──────────────────────────────────────────
initStars();
initClouds();
initCelestial();
initFireflies();
initButterflies();
updateScene();
setInterval(updateScene, 1000);
setInterval(pickWeather, 3600000);
</script>

<!-- GACHA WHEEL -->
<div id="gacha-wrap">
  <div id="wheel-outer" onclick="spinWheel()">
    <div id="wheel-pointer"></div>
    <canvas id="wheel-canvas" width="200" height="200"></canvas>
    <button id="spin-btn" onclick="event.stopPropagation();spinWheel()">🎰</button>
  </div>
  <div id="gacha-label">🍀 点击转盘抽角色！</div>
</div>

<!-- NORMAL / RARE REVEAL -->
<div id="reveal-modal">
  <div id="reveal-backdrop" onclick="closeReveal()"></div>
  <div id="reveal-card">
    <span id="rv-emoji"></span>
    <div id="rv-name"></div>
    <div id="rv-tag" class="rv-tag normal">普通</div>
    <button id="rv-close" onclick="closeReveal()">好哒！✓</button>
  </div>
</div>

<!-- ULTRA RARE SCREEN -->
<div id="ultra-screen">
  <div id="ultra-bg"></div>
  <div id="ultra-content">
    <div id="ultra-title">✨ 传说级！！！ ✨</div>
    <span id="ultra-emoji">🌈</span>
    <div id="ultra-name">彩虹神</div>
    <div id="ultra-subtitle">极为稀有的传说角色，全宇宙仅此一位！</div>
    <button id="ultra-close" onclick="closeUltra()">收下啦！🌟</button>
  </div>
</div>

<script>
(function(){
const GACHA=[
  {emoji:'🐻',name:'小熊布丁',rarity:'normal'},
  {emoji:'🐱',name:'喵咪酱',rarity:'normal'},
  {emoji:'🐸',name:'呱呱蛙',rarity:'normal'},
  {emoji:'🐰',name:'兔兔',rarity:'normal'},
  {emoji:'🐹',name:'仓鼠',rarity:'normal'},
  {emoji:'🦊',name:'小狐',rarity:'normal'},
  {emoji:'🐺',name:'月狼',rarity:'normal'},
  {emoji:'🐭',name:'米鼠',rarity:'normal'},
  {emoji:'🐮',name:'奶牛',rarity:'normal'},
  {emoji:'🐷',name:'嫩猪苗',rarity:'ultra'},
  {emoji:'🐔',name:'叽鸡',rarity:'normal'},
  {emoji:'🦁',name:'毛狮',rarity:'normal'},
  {emoji:'🐧',name:'鹅酱',rarity:'normal'},
  {emoji:'🦔',name:'刺君',rarity:'normal'},
  {emoji:'🦋',name:'蝴仙',rarity:'rare'},
  {emoji:'🦄',name:'独角',rarity:'rare'},
  {emoji:'🐲',name:'小神',rarity:'rare'},
  {emoji:'🧚',name:'小精',rarity:'rare'},
  {emoji:'🦚',name:'孔雀',rarity:'rare'},
  {emoji:'🌈',name:'彩虹',rarity:'rare'},
];

const COLORS=[
  '#b8e4b8','#fcd9b0','#aae6aa','#fbb8cc','#f5cb98',
  '#f0a870','#c0c8d4','#e8d4d4','#f4f4d8','#fbbcc8',
  '#fce898','#f4d888','#c4d8f0','#ccaa80',
  '#c4a8fc','#f0b0e8','#8aec9a','#fcd4a0','#84dccf',
  '#fce86a'
];

const N=20, SEG=360/N; // 18° each

function wRandom(){
  const pool=[];
  GACHA.forEach((c,i)=>{
    const w=c.rarity==='normal'?10:c.rarity==='rare'?3:1;
    for(let j=0;j<w;j++)pool.push(i);
  });
  return pool[Math.floor(Math.random()*pool.length)];
}

let deg=0, spinning=false;

function drawWheel(){
  const cv=document.getElementById('wheel-canvas');
  if(!cv)return;
  const ctx=cv.getContext('2d');
  const cx=100,cy=100,r=96;
  ctx.clearRect(0,0,200,200);
  const arc=2*Math.PI/N;
  const rot=deg*Math.PI/180-Math.PI/2;

  for(let i=0;i<N;i++){
    const a=rot+i*arc,b=a+arc;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,a,b);ctx.closePath();
    ctx.fillStyle=COLORS[i];ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=1.5;ctx.stroke();

    const mid=a+arc/2;
    const ex=cx+Math.cos(mid)*r*0.7,ey=cy+Math.sin(mid)*r*0.7;
    ctx.save();ctx.translate(ex,ey);
    ctx.font='15px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(GACHA[i].emoji,0,0);ctx.restore();

    if(GACHA[i].rarity!=='normal'){
      const dx=cx+Math.cos(mid)*r*0.46,dy=cy+Math.sin(mid)*r*0.46;
      ctx.beginPath();ctx.arc(dx,dy,4,0,2*Math.PI);
      ctx.fillStyle=GACHA[i].rarity==='ultra'?'#ffd700':'#ff69b4';
      ctx.fill();
    }
  }

  // outer gold ring
  ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);
  ctx.strokeStyle='#d4aa55';ctx.lineWidth=5;ctx.stroke();
  // subtle inner rim highlight
  ctx.beginPath();ctx.arc(cx,cy,r-3.5,0,2*Math.PI);
  ctx.strokeStyle='rgba(255,255,255,0.22)';ctx.lineWidth=3;ctx.stroke();
  // center hub
  ctx.beginPath();ctx.arc(cx,cy,24,0,2*Math.PI);
  ctx.fillStyle='rgba(255,251,230,.96)';ctx.fill();
  ctx.strokeStyle='#d4aa55';ctx.lineWidth=3;ctx.stroke();
}

function spinWheel(){
  if(spinning)return;
  spinning=true;
  const btn=document.getElementById('spin-btn');
  if(btn){btn.disabled=true;btn.textContent='🌀';}

  const idx=wRandom();
  // bring segment idx center to top pointer
  let target=-(idx*SEG+SEG/2);
  const minT=deg+5*360;
  while(target<minT)target+=360;
  target+=(Math.random()-.5)*SEG*.55; // slight variation within segment

  const dur=4200,t0=performance.now(),from=deg,delta=target-from;
  function ease(t){return 1-Math.pow(1-t,4);}

  function frame(now){
    const t=Math.min((now-t0)/dur,1);
    deg=from+delta*ease(t);
    drawWheel();
    if(t<1){requestAnimationFrame(frame);}
    else{
      deg=target;spinning=false;
      if(btn){btn.disabled=false;btn.textContent='🎰';}
      setTimeout(()=>reveal(idx),380);
    }
  }
  requestAnimationFrame(frame);
}

function reveal(idx){
  const c=GACHA[idx];
  if(c.rarity==='ultra'){showUltra(c);return;}
  const modal=document.getElementById('reveal-modal');
  document.getElementById('rv-emoji').textContent=c.emoji;
  document.getElementById('rv-name').textContent=c.name;
  const tag=document.getElementById('rv-tag');
  if(c.rarity==='rare'){
    tag.textContent='✨ 稀有！';tag.className='rv-tag rare';
    modal.className='reveal-rare';
    burst(42,'#ffd700');burst(28,'#ff80c0');
  }else{
    tag.textContent='普通';tag.className='rv-tag normal';
    modal.className='reveal-normal';
    burst(14,'#c8e8c8');
  }
  const em=document.getElementById('rv-emoji');
  em.style.animation='none';void em.offsetWidth;em.style.animation='';
  modal.style.display='flex';
}

function closeReveal(){document.getElementById('reveal-modal').style.display='none';}

function showUltra(c){
  const scr=document.getElementById('ultra-screen');
  document.getElementById('ultra-emoji').textContent=c.emoji;
  document.getElementById('ultra-name').textContent=c.name;
  scr.style.display='flex';
  document.body.classList.add('screen-shake');
  setTimeout(()=>document.body.classList.remove('screen-shake'),600);
  spawnStars(scr);
  for(let i=0;i<7;i++)setTimeout(fireworks,i*320);
}

function closeUltra(){
  const scr=document.getElementById('ultra-screen');
  scr.style.display='none';
  document.querySelectorAll('.ultra-star').forEach(s=>s.remove());
}

function spawnStars(parent){
  const icons=['⭐','✨','🌟','💫','⚡'];
  for(let i=0;i<28;i++){
    const s=document.createElement('div');
    s.className='ultra-star';
    s.textContent=icons[i%icons.length];
    const dur=2+Math.random()*4;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;
      animation-duration:${dur}s;animation-delay:${-Math.random()*dur}s;
      font-size:${10+Math.random()*18}px;`;
    parent.appendChild(s);
  }
}

function burst(n,color){
  for(let i=0;i<n;i++){
    const p=document.createElement('div');
    const ang=Math.random()*360,dist=55+Math.random()*155,sz=5+Math.random()*7;
    p.style.cssText=`position:fixed;left:50%;top:50%;
      width:${sz}px;height:${sz}px;border-radius:50%;
      background:${color};box-shadow:0 0 6px ${color};
      pointer-events:none;z-index:999;
      animation:particleFly 1.1s ease-out forwards;
      animation-delay:${Math.random()*.22}s;
      --dx:${Math.cos(ang*Math.PI/180)*dist}px;
      --dy:${Math.sin(ang*Math.PI/180)*dist}px;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1550);
  }
}

function fireworks(){
  const cols=['#ff0','#f80','#f0f','#0ff','#0f0','#f00','#fff'];
  const cx=18+Math.random()*64+'%',cy=8+Math.random()*58+'%';
  for(let i=0;i<24;i++){
    const p=document.createElement('div');
    const ang=Math.random()*360,dist=65+Math.random()*210,sz=3+Math.random()*6;
    const col=cols[i%cols.length];
    p.style.cssText=`position:fixed;left:${cx};top:${cy};
      width:${sz}px;height:${sz}px;border-radius:50%;
      background:${col};box-shadow:0 0 8px ${col};
      pointer-events:none;z-index:3000;
      animation:particleFly 1.4s ease-out forwards;
      --dx:${Math.cos(ang*Math.PI/180)*dist}px;
      --dy:${Math.sin(ang*Math.PI/180)*dist}px;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1750);
  }
}

window.spinWheel=spinWheel;
window.closeReveal=closeReveal;
window.closeUltra=closeUltra;
drawWheel();
})();
</script>
